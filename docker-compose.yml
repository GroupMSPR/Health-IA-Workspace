# =============================================================================
#  docker-compose.yml — Health-IA-Workspace (MSPR 3 HealthAI Coach)
#  Fichier unifié avec 3 profils Docker Compose
#
#  PROFILS :
#    backend    → Laravel + PostgreSQL 18 + MailCatcher
#    ia         → FastAPI + Ollama (LLaVA) + MongoDB
#    monitoring → ETL + Grafana + Prometheus + Alertmanager + Discord Bridge
#                 + Node Exporter + cAdvisor + Postgres Exporter
#                 + MongoDB Exporter + Blackbox Exporter
#    (aucun)    → Frontend + Mobile (toujours démarrés)
#
#  USAGE COMPLET :
#    docker compose --profile backend --profile ia --profile monitoring up -d
#
#  USAGE PAR PROFIL :
#    docker compose --profile backend up -d
#    docker compose --profile ia up -d
#    docker compose --profile monitoring up -d
#
#  VARIABLES REQUISES (.env à la racine du Workspace) :
#    DISCORD_WEBHOOK_URL=https://discord.com/api/webhooks/...
#    DB_PASSWORD=password
#    DB_USERNAME=sail
#    DB_DATABASE=laravel
#    MONGO_ROOT_USER=root
#    MONGO_ROOT_PASSWORD=example
# =============================================================================

name: healthai

networks:
  healthai_network:
    driver: bridge
    # Nommé healthai_backend_sail pour compatibilité avec les repos individuels
    # qui déclarent ce réseau en external (FastAPI, Monitoring, etc.)
    name: healthai_backend_sail

volumes:
  sail-pgsql:
  mongo_data:
  grafana_data:
  prometheus_data:
  alertmanager_data:
  # ollama-models : bind-mount relatif (voir service healthai_ollama)

services:

# =============================================================================
#  PROFIL : backend
#  Laravel (Sail 8.5) + PostgreSQL 18 + MailCatcher
# =============================================================================

  healthai_pgsql:
    image: postgres:18-alpine
    container_name: healthai_pgsql-1
    profiles: ["backend"]
    restart: unless-stopped
    environment:
      PGPASSWORD: ${DB_PASSWORD:-secret}
      POSTGRES_DB: ${DB_DATABASE:-laravel}
      POSTGRES_USER: ${DB_USERNAME:-sail}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - sail-pgsql:/var/lib/postgresql
      - ./Backend/vendor/laravel/sail/database/pgsql/create-testing-database.sql:/docker-entrypoint-initdb.d/10-create-testing-database.sql
    ports:
      - "${FORWARD_DB_PORT:-55432}:5432"
    networks:
      - healthai_network
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "${DB_DATABASE:-laravel}", "-U", "${DB_USERNAME:-sail}"]
      interval: 5s
      timeout: 5s
      retries: 3

  healthai_mailcatcher:
    image: schickling/mailcatcher
    container_name: healthai_mailcatcher-1
    profiles: ["backend"]
    restart: unless-stopped
    ports:
      - "1080:1080"
      - "1025:1025"
    networks:
      - healthai_network

  healthai_laravel:
    build:
      context: ./Backend/vendor/laravel/sail/runtimes/8.5
      dockerfile: Dockerfile
      args:
        WWWGROUP: ${WWWGROUP:-1000}
    image: sail-8.5/app
    container_name: healthai_laravel-1
    profiles: ["backend"]
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      healthai_pgsql:
        condition: service_healthy
    environment:
      WWWUSER: ${WWWUSER:-1000}
      LARAVEL_SAIL: 1
      XDEBUG_MODE: ${SAIL_XDEBUG_MODE:-off}
      XDEBUG_CONFIG: ${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}
      IGNITION_LOCAL_SITES_PATH: ${PWD}
    volumes:
      - ./Backend:/var/www/html
    ports:
      - "${APP_PORT:-80}:80"
      - "${VITE_PORT:-5173}:${VITE_PORT:-5173}"
    networks:
      - healthai_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/up"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

# =============================================================================
#  PROFIL : ia
#  FastAPI + Ollama (LLaVA) + MongoDB
# =============================================================================

  healthai_mongodb:
    image: mongo:latest
    container_name: healthai_mongodb
    profiles: ["ia"]
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER:-root}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:-example}
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - healthai_network

  healthai_ollama:
    image: ollama/ollama:latest
    container_name: healthai_ollama
    profiles: ["ia"]
    restart: always
    volumes:
      - ./API-Ollama/ollama-models:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - healthai_network
    # Décommenter si GPU Nvidia + WSL2 :
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  healthai_fastapi:
    build:
      context: ./API-Ollama
      dockerfile: Dockerfile
    container_name: healthai_fastapi
    profiles: ["ia"]
    restart: always
    depends_on:
      - healthai_ollama
      - healthai_mongodb
    environment:
      - OLLAMA_URL=http://healthai_ollama:11434
      - MONGO_URI=${MONGO_URI:-mongodb://root:example@healthai_mongodb:27017/}
    volumes:
      - ./API-Ollama/app:/code/app
      - ./API-Ollama/docker-volumes:/code/data
    ports:
      - "4000:4000"
    networks:
      - healthai_network

# =============================================================================
#  PROFIL : monitoring
#  ETL + Grafana Enterprise + Prometheus + Alertmanager + Discord Bridge
#  + Node Exporter + cAdvisor + Postgres Exporter + MongoDB Exporter
#  + Blackbox Exporter
#
#  Note réseau : tous ces services partagent healthai_backend_sail.
#  Le Frontend est sur frontend_default (réseau isolé) — le Blackbox Exporter
#  le sonde via host.docker.internal:5001 (port exposé sur le host).
# =============================================================================

  # --- ETL Python -----------------------------------------------------------
  healthai_etl:
    build:
      context: ./ETL
      dockerfile: Dockerfile
    container_name: healthai_etl
    profiles: ["monitoring"]
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - healthai_network

  # --- Grafana Enterprise ---------------------------------------------------
  healthai_grafana:
    image: grafana/grafana-enterprise
    container_name: healthai_grafana
    profiles: ["monitoring"]
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_MIN_REFRESH_INTERVAL=5s
      - GF_UNIFIED_ALERTING_ENABLED=true
    volumes:
      - grafana_data:/var/lib/grafana
      # Auto-chargement datasources (Prometheus + PostgreSQL), dashboards, alerting
      - ./Grafana/provisioning:/etc/grafana/provisioning:ro
      # Dashboard infra monitoring (healthai_monitoring.json)
      - ./Grafana/monitoring-dashboards:/var/lib/grafana/dashboards/monitoring:ro
      # Dashboards data Diana : users, foods, exercises, healthMetrics
      - ./Grafana/data-dashboards:/var/lib/grafana/dashboards/data:ro
    ports:
      - "3000:3000"
    networks:
      - healthai_network

  # --- Prometheus -----------------------------------------------------------
  healthai_prometheus:
    image: prom/prometheus:latest
    container_name: healthai_prometheus
    profiles: ["monitoring"]
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    volumes:
      - ./Monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./Monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - healthai_network

  # --- Alertmanager ---------------------------------------------------------
  healthai_alertmanager:
    image: prom/alertmanager:latest
    container_name: healthai_alertmanager
    profiles: ["monitoring"]
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ./Monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    networks:
      - healthai_network

  # --- Bridge Discord (Python maison) ---------------------------------------
  # Remplace rogerrum/alertmanager-discord (embeds mal formés → 403 Discord)
  healthai_discord_bridge:
    build:
      context: ./Monitoring/discord-bridge
      dockerfile: Dockerfile
    container_name: healthai_alertmanager_discord
    profiles: ["monitoring"]
    restart: unless-stopped
    environment:
      - DISCORD_WEBHOOK=${DISCORD_WEBHOOK_URL}
    ports:
      - "9094:9094"
    networks:
      - healthai_network

  # --- Node Exporter (CPU, RAM, disque hôte) --------------------------------
  healthai_node_exporter:
    image: prom/node-exporter:latest
    container_name: healthai_node_exporter
    profiles: ["monitoring"]
    restart: unless-stopped
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "9100:9100"
    networks:
      - healthai_network

  # --- cAdvisor (ressources Docker globales) --------------------------------
  # ⚠️ WSL2 : métriques globales uniquement (id="/"), pas par conteneur
  healthai_cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: healthai_cadvisor
    profiles: ["monitoring"]
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8080:8080"
    networks:
      - healthai_network

  # --- Postgres Exporter ----------------------------------------------------
  healthai_postgres_exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:latest
    container_name: healthai_postgres_exporter
    profiles: ["monitoring"]
    restart: unless-stopped
    environment:
      - DATA_SOURCE_NAME=postgresql://${DB_USERNAME:-sail}:${DB_PASSWORD:-secret}@healthai_pgsql:5432/${DB_DATABASE:-laravel}?sslmode=disable
    ports:
      - "9187:9187"
    networks:
      - healthai_network

  # --- MongoDB Exporter -----------------------------------------------------
  healthai_mongodb_exporter:
    image: percona/mongodb_exporter:0.40
    container_name: healthai_mongodb_exporter
    profiles: ["monitoring"]
    restart: unless-stopped
    command:
      - '--collect-all'
      - '--compatible-mode'
    environment:
      - MONGODB_URI=mongodb://${MONGO_ROOT_USER:-root}:${MONGO_ROOT_PASSWORD:-example}@healthai_mongodb:27017
    ports:
      - "9216:9216"
    networks:
      - healthai_network

  # --- Blackbox Exporter (sondes HTTP up/down) ------------------------------
  # Frontend sondé via host.docker.internal:5001 car sur réseau frontend_default
  healthai_blackbox_exporter:
    image: prom/blackbox-exporter:latest
    container_name: healthai_blackbox_exporter
    profiles: ["monitoring"]
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9115:9115"
    networks:
      - healthai_network

# =============================================================================
#  PAS DE PROFIL → Frontend et Mobile démarrent toujours
# =============================================================================

  healthai_frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: healthai_frontend
    restart: unless-stopped
    volumes:
      - ./Frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    ports:
      - "5001:5173"
    networks:
      - healthai_network

  healthai_mobile:
    build:
      context: ./Mobile
      dockerfile: Dockerfile
    container_name: healthai_mobile
    restart: unless-stopped
    tty: true
    stdin_open: true
    env_file:
      - ./Mobile/.env
    environment:
      - NODE_ENV=development
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
    volumes:
      - ./Mobile:/app
      - /app/node_modules
    ports:
      - "6000:8081"
      - "19000:19000"
      - "19001:19001"
    networks:
      - healthai_network