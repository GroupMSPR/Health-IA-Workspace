global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: 'healthai-coach'
    env: 'production'
    machine: 'diana'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['healthai_alertmanager:9093']

rule_files:
  - '/etc/prometheus/rules/*.yml'

scrape_configs:

  # Prometheus lui-même
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # Métriques système hôte
  - job_name: 'node'
    static_configs:
      - targets: ['healthai_node_exporter:9100']
        labels:
          service: 'host'

  # Métriques conteneurs Docker
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['healthai_cadvisor:8080']
        labels:
          service: 'docker'

  # PostgreSQL
  - job_name: 'postgres'
    static_configs:
      - targets: ['healthai_postgres_exporter:9187']
        labels:
          service: 'postgresql'

  # MongoDB
  - job_name: 'mongodb'
    static_configs:
      - targets: ['healthai_mongodb_exporter:9216']
        labels:
          service: 'mongodb'

  # Sondes HTTP sur tous les services applicatifs
  - job_name: 'blackbox_http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://healthai_laravel:80/up
          - http://healthai_fastapi:4000/
          - http://healthai_ollama:11434/
          - http://host.docker.internal:5001/
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: healthai_blackbox_exporter:9115
